name: Restore App SPA
on:
  workflow_dispatch:

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Restore app/index.html
        env:
          B64_CONTENT: 
        run: |
          python3 << 'EOF'
import gzip, base64, os
b64 = os.environ['B64_CONTENT']
data = gzip.decompress(base64.b64decode(b64))
with open('app/index.html', 'wb') as f:
    f.write(data)
print(f'Written {len(data)} bytes to app/index.html')
EOF
      - name: Commit and push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add app/index.html
          git diff --cached --stat
          git commit -m "feat: move app SPA to /app/ subdirectory

- App now served from /app/ path, marketing page at root
- No code changes to the app itself"
          git push
      - name: Cleanup this workflow
        run: |
          git rm .github/workflows/restore-spa.yml
          git commit -m "ci: remove restore workflow"
          git push
